<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSVデータフィルタービューア (修正版)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 15px;
            color: #2c3e50;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }
        .url-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #fcfcfc;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        .url-box input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 14px;
        }
        .url-box button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .url-box button:hover {
            background-color: #2980b9;
        }
        .status-bar {
            margin-bottom: 15px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-reset {
            background-color: #e2e8f0;
            color: #475569;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-reset:hover {
            background-color: #cbd5e1;
        }
        .table-wrapper {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            text-align: left;
        }
        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        th {
            background-color: #f8fafc;
            color: #1e293b;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: inset 0 -1px 0 #e2e8f0;
        }
        .filter-row th {
            top: 37px;
            background-color: #f1f5f9;
            padding: 5px 8px;
        }
        .filter-input {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid #cbd5e1;
            border-radius: 3px;
            font-size: 11px;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-weight: bold;
        }
        .error-msg {
            color: #ef4444;
            background: #fef2f2;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
            border: 1px solid #fee2e2;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CSVデータ表示・個別フィルターツール</h1>
    
    <div class="url-box">
        <input type="text" id="urlInput" value="https://docs.google.com/spreadsheets/d/e/2PACX-1vSqN_Kv6KW5toM2YFGaht_03ADnRA6it4yxLDB7w9jOYx2xzkLruQGCxLXgf3rJUd2_5nuGI7tzvroN/pubhtml" placeholder="Googleスプレッドシートのウェブ公開URL">
        <button onclick="fetchAndParseData()">データを読み込む</button>
    </div>

    <div id="errorContainer"></div>

    <div class="status-bar">
        <div id="recordCount">表示件数: -- / -- 件</div>
        <button class="btn-reset" onclick="resetAllFilters()">すべてのフィルターをクリア</button>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr id="headerRow"></tr>
                <tr id="filterRow"></tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="21" class="loading">上のボタンを押してデータを読み込んでください。</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const targetColumns = [
        { name: "アイテム名", key: "アイテム名_1" },
        { name: "種類", key: "種類" },
        { name: "ティア", key: "ティア" },
        { name: "鉄", key: "鉄" },
        { name: "木材", key: "木材" },
        { name: "革", key: "革" },
        { name: "薬草", key: "薬草" },
        { name: "鋼鉄", key: "鋼鉄" },
        { name: "硬材", key: "硬材" },
        { name: "織物", key: "織物" },
        { name: "ｵｲﾙ", key: "ｵｲﾙ" },
        { name: "ｴｰﾃﾙ", key: "ｴｰﾃﾙ" },
        { name: "宝石", key: "宝石" },
        { name: "ｴッｾﾝｽ", key: "ｴッｾﾝｽ" },
        { name: "その他の材料", key: "その他の材料_1" },
        { name: "品質", key: "品質_1" },
        { name: "必要個数", key: "必要個数_1" },
        { name: "その他の材料", key: "その他の材料_2" },
        { name: "品質", key: "品質_2" },
        { name: "必要個数", key: "必要個数_2" },
        { name: "飛行船パワー", key: "飛行船パワー" }
    ];

    let allRowsData = [];
    let currentFilters = {};

    function initTableHeader() {
        const headerRow = document.getElementById('headerRow');
        const filterRow = document.getElementById('filterRow');
        headerRow.innerHTML = '';
        filterRow.innerHTML = '';

        targetColumns.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col.name;
            headerRow.appendChild(th);

            const filterTh = document.createElement('th');
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'filter-input';
            input.placeholder = '絞り込み...';
            input.dataset.key = col.key;
            input.addEventListener('input', (e) => {
                currentFilters[col.key] = e.target.value.trim().toLowerCase();
                applyFilters();
            });
            filterTh.appendChild(input);
            filterRow.appendChild(filterTh);
            
            currentFilters[col.key] = '';
        });
    }

    function resetAllFilters() {
        const inputs = document.querySelectorAll('.filter-input');
        inputs.forEach(input => input.value = '');
        for (let key in currentFilters) currentFilters[key] = '';
        applyFilters();
    }

    async function fetchAndParseData() {
        const urlInput = document.getElementById('urlInput').value.trim();
        const errorContainer = document.getElementById('errorContainer');
        const tableBody = document.getElementById('tableBody');
        
        errorContainer.innerHTML = '';
        tableBody.innerHTML = '<tr><td colspan="21" class="loading">データを取得・解析中...</td></tr>';
        
        if (!urlInput) {
            showError("URLを入力してください。");
            return;
        }

        // URLを直接CSVダウンロード形式に安全に置換
        let targetUrl = urlInput;
        if (urlInput.includes('/pubhtml')) {
            targetUrl = urlInput.split('/pubhtml')[0] + '/pub?output=csv';
        } else if (urlInput.includes('/edit')) {
            targetUrl = urlInput.split('/edit')[0] + '/export?format=csv';
        }

        try {
            // 最も安定している公式のデータ取得（プロキシを排除しダイレクトにfetch）
            const response = await fetch(targetUrl);
            if (!response.ok) throw new Error("ネットワーク応答が正常ではありません。");
            
            const csvText = await response.text();
            parseCsvData(csvText);

        } catch (error) {
            console.error(error);
            showError("直接データが取得できませんでした。ブラウザのセキュリティ制限(CORS)の可能性があります。解決しない場合は、スプレッドシートの「ファイル」＞「共有」＞「ウェブに公開」で『カンマ区切り値(.csv)』を選択して公開し、そのURLを貼り付けてみてください。");
            tableBody.innerHTML = '<tr><td colspan="21" class="loading" style="color:red;">データの読み込みに失敗しました。</td></tr>';
        }
    }

    function parseCsvData(csvText) {
        const lines = [];
        let row = [""];
        let inQuotes = false;

        for (let i = 0; i < csvText.length; i++) {
            let c = csvText[i];
            let next = csvText[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) {
                row.push('');
            } else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row);
                row = [''];
            } else {
                row[row.length - 1] += c;
            }
        }
        if (row.length > 1 || row[0] !== '') lines.push(row);
        if (lines.length === 0) return;

        const rawHeaders = lines[0].map(h => h.trim());
        const dataRows = lines.slice(1);

        processRows(rawHeaders, dataRows);
    }

    function processRows(rawHeaders, dataRows) {
        const counts = {};
        const mapping = {};

        targetColumns.forEach(tc => {
            mapping[tc.key] = -1;
        });

        rawHeaders.forEach((headerName, index) => {
            if (!headerName) return;
            
            counts[headerName] = (counts[headerName] || 0) + 1;
            let currentCount = counts[headerName];

            // 1文字ずつの完全一致を厳密にチェック
            if (headerName === "アイテム名" && currentCount === 1) mapping["アイテム名_1"] = index;
            if (headerName === "種類") mapping["種類"] = index;
            if (headerName === "ティア") mapping["ティア"] = index;
            if (headerName === "鉄") mapping["鉄"] = index;
            if (headerName === "木材") mapping["木材"] = index;
            if (headerName === "革") mapping["革"] = index;
            if (headerName === "薬草") mapping["薬草"] = index;
            if (headerName === "鋼鉄") mapping["鋼鉄"] = index;
            if (headerName === "硬材") mapping["硬材"] = index;
            if (headerName === "織物") mapping["織物"] = index;
            if (headerName === "ｵｲﾙ") mapping["ｵｲﾙ"] = index;
            if (headerName === "ｴｰﾃﾙ") mapping["ｴｰﾃﾙ"] = index;
            if (headerName === "宝石") mapping["宝石"] = index;
            if (headerName === "ｴッｾﾝｽ") mapping["ｴッｾﾝｽ"] = index;
            
            if (headerName === "その他の材料") {
                if (currentCount === 1) mapping["formatted_その他の材料_1"] = index; // 一時退避
                if (currentCount === 2) mapping["その他の材料_2"] = index;
            }
            if (headerName === "品質") {
                if (currentCount === 1) mapping["formatted_品質_1"] = index;
                if (currentCount === 2) mapping["品質_2"] = index;
            }
            if (headerName === "必要個数") {
                if (currentCount === 1) mapping["formatted_必要個数_1"] = index;
                if (currentCount === 2) mapping["必要個数_2"] = index;
            }
            if (headerName === "飛行船パワー") mapping["飛行船パワー"] = index;
        });

        // 退避データの正式マッピング
        if(mapping["formatted_その他の材料_1"]) mapping["その他の材料_1"] = mapping["formatted_その他の材料_1"];
        if(mapping["formatted_品質_1"]) mapping["品質_1"] = mapping["formatted_品質_1"];
        if(mapping["formatted_必要個数_1"]) mapping["必要個数_1"] = mapping["formatted_必要個数_1"];

        allRowsData = [];
        dataRows.forEach(row => {
            if (row.length === 0 || row.every(cell => cell === "")) return;

            let rowObj = {};
            targetColumns.forEach(col => {
                let csvIdx = mapping[col.key];
                rowObj[col.key] = (csvIdx !== -1 && csvIdx < row.length) ? row[csvIdx] : "";
            });
            allRowsData.push(rowObj);
        });

        applyFilters();
    }

    function applyFilters() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        const filteredRows = allRowsData.filter(row => {
            for (let col of targetColumns) {
                let filterVal = currentFilters[col.key];
                if (filterVal) {
                    let cellVal = (row[col.key] || '').toLowerCase();
                    if (!cellVal.includes(filterVal)) {
                        return false;
                    }
                }
            }
            return true;
        });

        document.getElementById('recordCount').textContent = `表示件数: ${filteredRows.length} / ${allRowsData.length} 件`;

        if (filteredRows.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="21" class="loading">一致するデータがありません。</td></tr>';
            return;
        }

        let htmlBuffer = '';
        filteredRows.forEach(row => {
            htmlBuffer += '<tr>';
            targetColumns.forEach(col => {
                htmlBuffer += `<td>${escapeHtml(row[col.key])}</td>`;
            });
            htmlBuffer += '</tr>';
        });
        tableBody.innerHTML = htmlBuffer;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function showError(msg) {
        document.getElementById('errorContainer').innerHTML = `<div class="error-msg">${msg}</div>`;
    }

    window.onload = function() {
        initTableHeader();
    };
</script>

</body>
</html>
